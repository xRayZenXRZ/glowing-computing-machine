info:
  name: Read all matchs
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/matchs"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: All matchs
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].id
      operator: eq
      value: "1"
    - expression: res.body.data[0].stadium
      operator: isDefined
    - expression: res.body.data[0].stadium.city
      operator: isDefined
    - expression: res.body.data[0].stadium.city.country
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
